<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SportDB Player Extractor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px}
h1{color:#F6D318;margin-bottom:20px;font-size:24px}
.panel{background:#0c2850;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;font-size:13px;color:#8faed4;margin-bottom:6px}
input,select{background:#091f3c;color:#e8edf5;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;width:100%;font-size:14px;margin-bottom:12px}
button{background:linear-gradient(135deg,#F6D318,#e8b800);color:#03172e;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
button:hover{opacity:.9}
button:disabled{opacity:.4;cursor:not-allowed}
button.secondary{background:#1a3a6a;color:#e8edf5}
#status{background:#091f3c;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px;margin:12px 0;font-size:12px;color:#8faed4;max-height:500px;overflow-y:auto;white-space:pre-wrap}
#output{width:100%;height:400px;background:#091f3c;color:#0fb866;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;font-family:'Consolas',monospace;font-size:11px;resize:vertical}
.progress{background:#091f3c;border-radius:8px;height:24px;margin:8px 0;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,#F6D318,#0fb866);height:100%;transition:width .3s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#03172e}
.check-group{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.check-group label{display:inline-flex;align-items:center;gap:6px;background:#091f3c;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;border:1px solid rgba(255,255,255,.1)}
.check-group label:hover{border-color:#F6D318}
.check-group input[type=checkbox]{accent-color:#F6D318}
.stat{display:inline-block;background:#091f3c;padding:4px 10px;border-radius:6px;margin:2px;font-size:12px}
.stat b{color:#F6D318}
.api-select{display:flex;gap:12px;margin-bottom:12px}
.api-select label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;color:#e8edf5}
.api-select input[type=radio]{accent-color:#F6D318}
</style>
</head>
<body>
<h1>&#9917; SportDB Player Extractor v3</h1>

<div class="panel">
  <label>API Key (SportDB)</label>
  <input type="text" id="apiKey" placeholder="Pegá tu API key acá">
  <label>API a usar:</label>
  <div class="api-select">
    <label><input type="radio" name="apiChoice" value="transfermarkt" checked> TransferMarkt (planteles + valores)</label>
    <label><input type="radio" name="apiChoice" value="flashscore"> Flashscore (equipos + stats)</label>
  </div>
  <button onclick="testAPI()">1. Probar conexión</button>
  <button class="secondary" onclick="discoverLeagues()">2. Descubrir ligas</button>
</div>

<div class="panel" id="leaguePanel" style="display:none">
  <label>Ligas encontradas — seleccioná las que querés extraer:</label>
  <div id="leagueChecks" class="check-group"></div>
  <br>
  <button onclick="extractAll()">3. Extraer jugadores de ligas seleccionadas</button>
</div>

<div class="panel">
  <label>Progreso</label>
  <div class="progress"><div class="progress-bar" id="pbar" style="width:0%">0%</div></div>
  <div id="status">Esperando...</div>
  <div style="margin-top:8px">
    <span class="stat">Ligas: <b id="sLeagues">0</b></span>
    <span class="stat">Equipos: <b id="sTeams">0</b></span>
    <span class="stat">Jugadores: <b id="sPlayers">0</b></span>
    <span class="stat">Requests: <b id="sReqs">0</b></span>
  </div>
</div>

<div class="panel">
  <label>Resultado (código JS para buildMkt)</label>
  <button class="secondary" onclick="copyOutput()">Copiar al portapapeles</button>
  <button class="secondary" onclick="downloadOutput()">Descargar .js</button>
  <button class="secondary" onclick="downloadCSV()">Descargar .csv</button>
  <br><br>
  <textarea id="output" readonly placeholder="El código generado aparecerá acá..."></textarea>
</div>

<script>
let API_KEY = '';
let allPlayers = [];
let discoveredLeagues = [];
let reqCount = 0;

const TARGET_COUNTRIES_TM = {
  'Argentina':true,'Brazil':true,'Chile':true,'Paraguay':true,
  'Uruguay':true,'Colombia':true,'Peru':true,'Ecuador':true,
  'Venezuela':true,'Bolivia':true,'Mexico':true,'USA':true,
  'United States':true,'England':true,'Spain':true,'France':true,
  'Germany':true,'Italy':true,'Netherlands':true,'Russia':true,
  'Belgium':true,'Portugal':true,'Turkey':true
};

function log(msg) {
  const el = document.getElementById('status');
  el.textContent = msg + '\n' + el.textContent.slice(0, 30000);
}

function setProgress(pct) {
  const bar = document.getElementById('pbar');
  bar.style.width = pct + '%';
  bar.textContent = Math.round(pct) + '%';
}

function updateStats(leagues, teams, players) {
  document.getElementById('sLeagues').textContent = leagues;
  document.getElementById('sTeams').textContent = teams;
  document.getElementById('sPlayers').textContent = players;
  document.getElementById('sReqs').textContent = reqCount;
}

function getApiChoice() {
  return document.querySelector('input[name="apiChoice"]:checked').value;
}

async function apiGet(path, apiType) {
  apiType = apiType || getApiChoice();
  reqCount++;
  document.getElementById('sReqs').textContent = reqCount;
  if (reqCount % 3 === 0) await sleep(1100);
  const fnUrl = '/.netlify/functions/sportdb?api=' + apiType + '&key=' + encodeURIComponent(API_KEY) + '&path=' + encodeURIComponent(path);
  try {
    const res = await fetch(fnUrl);
    if (!res.ok) {
      log(`ERROR ${res.status} en ${path}`);
      return null;
    }
    return await res.json();
  } catch (e) {
    log(`FETCH ERROR: ${e.message} — ${path}`);
    return null;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== TEST CONNECTION ==========
async function testAPI() {
  API_KEY = document.getElementById('apiKey').value.trim();
  if (!API_KEY) { alert('Ingresá tu API key'); return; }
  const api = getApiChoice();
  log(`Probando conexión (${api})...`);

  if (api === 'transfermarkt') {
    const countries = await apiGet('/countries', 'transfermarkt');
    if (countries) {
      log('✓ TransferMarkt conectado');
      log('Países: ' + JSON.stringify(countries).slice(0, 800));
    } else {
      log('✗ Error conectando a TransferMarkt');
    }
  } else {
    const data = await apiGet('/football', 'flashscore');
    if (data) {
      log('✓ Flashscore conectado');
      if (Array.isArray(data)) log(`${data.length} países encontrados`);
    } else {
      log('✗ Error conectando a Flashscore');
    }
  }
}

// ========== DISCOVER LEAGUES ==========
async function discoverLeagues() {
  API_KEY = document.getElementById('apiKey').value.trim();
  if (!API_KEY) { alert('Ingresá tu API key'); return; }
  const api = getApiChoice();
  log(`Descubriendo ligas via ${api}...`);
  discoveredLeagues = [];

  if (api === 'transfermarkt') {
    await discoverTM();
  } else {
    await discoverFS();
  }

  log(`\nTotal: ${discoveredLeagues.length} ligas encontradas`);

  const panel = document.getElementById('leaguePanel');
  panel.style.display = 'block';
  const checksDiv = document.getElementById('leagueChecks');
  checksDiv.innerHTML = discoveredLeagues.map((lg, i) =>
    `<label><input type="checkbox" value="${i}" ${i < 40 ? 'checked' : ''}> ${lg.country} - ${lg.name}</label>`
  ).join('');
}

async function discoverTM() {
  const countries = await apiGet('/countries', 'transfermarkt');
  if (!countries) { log('No se pudieron obtener países'); return; }

  // countries could be array or object
  let countryList = Array.isArray(countries) ? countries : [];
  if (!countryList.length && typeof countries === 'object') {
    for (const v of Object.values(countries)) {
      if (Array.isArray(v)) { countryList = v; break; }
    }
  }

  log(`${countryList.length} países disponibles`);
  if (countryList.length > 0) {
    log('País ejemplo: ' + JSON.stringify(countryList[0]).slice(0, 300));
  }

  for (const country of countryList) {
    const cName = country.name || country.NAME || '';
    const cId = country.id || country.ID || '';

    const isTarget = Object.keys(TARGET_COUNTRIES_TM).some(t =>
      cName.toLowerCase().includes(t.toLowerCase())
    );
    if (!isTarget) continue;

    log(`Buscando ligas de ${cName} (id: ${cId})...`);
    const comps = await apiGet(`/countries/${cId}`, 'transfermarkt');
    if (!comps) continue;

    let compList = Array.isArray(comps) ? comps : [];
    if (!compList.length && typeof comps === 'object') {
      for (const v of Object.values(comps)) {
        if (Array.isArray(v)) { compList = v; break; }
      }
    }

    if (compList.length === 0 && typeof comps === 'object') {
      // Maybe single competition or nested
      log('  Estructura: ' + JSON.stringify(Object.keys(comps)));
      log('  Data: ' + JSON.stringify(comps).slice(0, 500));
    }

    for (const comp of compList) {
      const lName = comp.name || comp.NAME || comp.title || '';
      const lId = comp.id || comp.ID || '';
      if (lName) {
        discoveredLeagues.push({
          country: cName, name: lName, id: lId,
          api: 'transfermarkt', raw: comp
        });
        log(`  ✓ ${lName} (${lId})`);
      }
    }
  }
}

async function discoverFS() {
  const countries = await apiGet('/football', 'flashscore');
  if (!countries || !Array.isArray(countries)) { log('No se pudieron obtener países'); return; }

  log(`${countries.length} países`);

  for (const country of countries) {
    const cName = country.name || '';
    const cSlug = country.slug || '';
    const compPath = (country.competitions || '').replace('/api/flashscore', '');

    const isTarget = Object.keys(TARGET_COUNTRIES_TM).some(t =>
      cName.toLowerCase().includes(t.toLowerCase())
    );
    if (!isTarget) continue;

    log(`Buscando ligas de ${cName}...`);
    const leagues = await apiGet(compPath, 'flashscore');
    if (!leagues) continue;

    let leagueList = Array.isArray(leagues) ? leagues : [];
    if (!leagueList.length && typeof leagues === 'object') {
      for (const v of Object.values(leagues)) {
        if (Array.isArray(v)) { leagueList = v; break; }
      }
    }

    for (const lg of leagueList) {
      const lName = lg.name || '';
      const lId = lg.id || '';
      const lSlug = lg.slug || '';
      if (lName) {
        discoveredLeagues.push({
          country: cName, countrySlug: cSlug, name: lName,
          id: lId, slug: lSlug, api: 'flashscore', raw: lg
        });
        log(`  ✓ ${lName}`);
      }
    }
  }
}

// ========== EXTRACT PLAYERS ==========
async function extractAll() {
  API_KEY = document.getElementById('apiKey').value.trim();
  allPlayers = [];

  const checks = document.querySelectorAll('#leagueChecks input:checked');
  const selected = Array.from(checks).map(c => discoveredLeagues[parseInt(c.value)]);
  if (selected.length === 0) { alert('Seleccioná al menos una liga'); return; }

  const api = selected[0].api || getApiChoice();
  log(`\nExtrayendo ${selected.length} ligas via ${api}...`);

  if (api === 'transfermarkt') {
    await extractTM(selected);
  } else {
    await extractFS(selected);
  }

  setProgress(100);
  log(`\n=== RESULTADO: ${allPlayers.length} jugadores extraídos ===`);
  generateOutput();
}

// TransferMarkt extraction: /competitions/{id} → clubs → /clubs/{id}/players
async function extractTM(selected) {
  let totalTeams = 0, totalPlayers = 0;

  for (let li = 0; li < selected.length; li++) {
    const lg = selected[li];
    setProgress((li / selected.length) * 95);
    log(`\n[${li+1}/${selected.length}] ${lg.country} - ${lg.name} (${lg.id})...`);

    // Get competition details to find clubs
    const comp = await apiGet(`/competitions/${lg.id}`, 'transfermarkt');
    if (!comp) { log('  ✗ No se pudo obtener la competición'); continue; }

    if (li < 3) {
      log('  Competición keys: ' + JSON.stringify(Object.keys(comp)));
      log('  Data: ' + JSON.stringify(comp).slice(0, 800));
    }

    // Find clubs in the competition data
    let clubs = [];
    if (Array.isArray(comp)) {
      clubs = comp;
    } else if (typeof comp === 'object') {
      // Look for clubs/teams array
      for (const key of ['clubs','teams','participants','table','standings','data']) {
        if (comp[key] && Array.isArray(comp[key])) { clubs = comp[key]; break; }
      }
      // Check nested
      if (clubs.length === 0) {
        for (const v of Object.values(comp)) {
          if (Array.isArray(v) && v.length > 2 && typeof v[0] === 'object') {
            clubs = v;
            break;
          }
        }
      }
    }

    if (li < 3 && clubs.length > 0) {
      log('  Club ejemplo: ' + JSON.stringify(clubs[0]).slice(0, 500));
      log('  Club keys: ' + JSON.stringify(Object.keys(clubs[0])));
    }

    log(`  ${clubs.length} clubs encontrados`);
    totalTeams += clubs.length;

    for (let ci = 0; ci < clubs.length; ci++) {
      const club = clubs[ci];
      const clubName = club.name || club.NAME || club.clubName || '';
      const clubId = club.id || club.ID || club.clubId || '';

      if (!clubId) { log(`  [${ci+1}] ${clubName} — sin ID, skip`); continue; }
      log(`  [${ci+1}/${clubs.length}] ${clubName} (${clubId})...`);

      // GET /clubs/{id}/players — THE KEY ENDPOINT
      const playersData = await apiGet(`/clubs/${clubId}/players`, 'transfermarkt');
      if (!playersData) { log(`    ✗ Sin datos de jugadores`); continue; }

      if (ci < 2 && li < 2) {
        log('    Players keys: ' + JSON.stringify(Object.keys(playersData)));
        log('    Players data: ' + JSON.stringify(playersData).slice(0, 800));
      }

      let playerList = [];
      if (Array.isArray(playersData)) {
        playerList = playersData;
      } else if (typeof playersData === 'object') {
        for (const v of Object.values(playersData)) {
          if (Array.isArray(v) && v.length > 0) { playerList = v; break; }
        }
      }

      if (ci < 2 && li < 2 && playerList.length > 0) {
        log('    Jugador ejemplo: ' + JSON.stringify(playerList[0]).slice(0, 600));
        log('    Jugador keys: ' + JSON.stringify(Object.keys(playerList[0])));
      }

      let added = 0;
      for (const p of playerList) {
        const name = p.name || p.playerName || p.fullName || '';
        if (!name) continue;

        const player = {
          name,
          age: p.age || 0,
          nat: p.nationality || p.nationalities?.[0] || p.country || '',
          pos: p.position || p.mainPosition || p.pos || '',
          club: clubName,
          league: lg.name,
          country: lg.country,
          goals: p.goals || 0,
          assists: p.assists || 0,
          apps: p.appearances || p.matches || 0,
          marketVal: parseMarketVal(p.marketValue || p.value || p.currentMarketValue || ''),
          number: p.shirtNumber || p.number || p.jerseyNumber || 0,
          playerId: p.id || p.playerId || ''
        };
        allPlayers.push(player);
        added++;
        totalPlayers++;
      }
      log(`    ✓ ${added} jugadores`);
      updateStats(li + 1, totalTeams, totalPlayers);
    }
  }
}

// Flashscore extraction: /team/{slug}/{id} includes squad
async function extractFS(selected) {
  let totalTeams = 0, totalPlayers = 0;

  for (let li = 0; li < selected.length; li++) {
    const lg = selected[li];
    const raw = lg.raw || {};
    setProgress((li / selected.length) * 95);
    log(`\n[${li+1}/${selected.length}] ${lg.country} - ${lg.name}...`);

    // Get teams from league standings
    let paths = [];
    for (const [k, v] of Object.entries(raw)) {
      if (typeof v === 'string' && v.includes('/football/')) {
        paths.push(v.replace('/api/flashscore', ''));
      }
    }
    const cs = lg.countrySlug || lg.country.toLowerCase().replace(/\s+/g, '-');
    const ls = lg.slug || lg.name.toLowerCase().replace(/\s+/g, '-');
    paths.push(`/football/${cs}/${ls}/standings`);
    paths.push(`/football/${cs}/${ls}`);

    let leagueData = null;
    for (const p of paths) {
      leagueData = await apiGet(p, 'flashscore');
      if (leagueData) break;
    }
    if (!leagueData) { log('  ✗ Sin datos de liga'); continue; }

    // Find teams array
    let teams = [];
    if (Array.isArray(leagueData)) {
      teams = leagueData;
    } else if (typeof leagueData === 'object') {
      for (const v of Object.values(leagueData)) {
        if (Array.isArray(v) && v.length > 2) { teams = v; break; }
      }
    }

    log(`  ${teams.length} equipos`);
    totalTeams += teams.length;

    for (let ti = 0; ti < teams.length; ti++) {
      const team = teams[ti];
      const teamName = team.name || '';
      const teamId = team.id || '';
      const teamSlug = team.slug || teamName.toLowerCase().replace(/[^a-z0-9]+/g, '-');

      if (!teamId) continue;
      log(`  [${ti+1}/${teams.length}] ${teamName}...`);

      // Flashscore team endpoint: /team/{slug}/{id}
      const teamData = await apiGet(`/team/${teamSlug}/${teamId}`, 'flashscore');
      if (!teamData) { log(`    ✗ Sin datos`); continue; }

      if (ti < 2 && li < 2) {
        log('    Team keys: ' + JSON.stringify(Object.keys(teamData)));
        log('    Data: ' + JSON.stringify(teamData).slice(0, 800));
      }

      // Find squad/players in team data
      let squad = [];
      if (typeof teamData === 'object') {
        for (const key of ['squad','players','roster','data']) {
          if (teamData[key] && Array.isArray(teamData[key])) { squad = teamData[key]; break; }
          if (teamData[key] && typeof teamData[key] === 'object') {
            for (const v of Object.values(teamData[key])) {
              if (Array.isArray(v)) { squad.push(...v); }
            }
            if (squad.length > 0) break;
          }
        }
      }

      if (ti < 2 && li < 2 && squad.length > 0) {
        log('    Jugador ejemplo: ' + JSON.stringify(squad[0]).slice(0, 500));
      }

      let added = 0;
      for (const p of squad) {
        const name = p.name || p.playerName || '';
        if (!name) continue;
        const lower = name.toLowerCase();
        const badWords = ['play off','stage','final','relegation','promotion','apertura','clausura','copa','round','group'];
        if (badWords.some(w => lower.includes(w))) continue;

        allPlayers.push({
          name,
          age: p.age || 0,
          nat: p.nationality || p.country || p.flag || '',
          pos: p.position || p.pos || '',
          club: teamName,
          league: lg.name,
          country: lg.country,
          goals: p.goals || 0,
          assists: p.assists || 0,
          apps: p.appearances || p.matches || 0,
          marketVal: parseMarketVal(p.marketValue || p.value || ''),
          number: p.number || p.shirt || 0
        });
        added++;
        totalPlayers++;
      }
      log(`    ✓ ${added} jugadores`);
      updateStats(li + 1, totalTeams, totalPlayers);
    }
  }
}

// Parse market value strings like "€25.00m", "€500k", or numeric values
function parseMarketVal(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  const s = String(val).toLowerCase().replace(/[€$£,\s]/g, '');
  let num = parseFloat(s);
  if (isNaN(num)) return 0;
  if (s.includes('m') || s.includes('mil')) return num;
  if (s.includes('k') || s.includes('thou')) return num / 1000;
  if (num > 1000) return num / 1000000;
  return num;
}

// ========== OUTPUT GENERATION ==========
function mapPos(pos) {
  const p = (pos || '').toLowerCase();
  if (p.includes('goalkeeper') || p.includes('keeper') || p === 'gk' || p.includes('torwart')) return 'ARQ';
  if (p.includes('centre-back') || p.includes('center-back') || p.includes('central defender') || p === 'cb' || p.includes('innenverteidiger')) return 'DFC';
  if (p.includes('left-back') || p.includes('left back') || p === 'lb' || p.includes('linker verteidiger')) return 'DFI';
  if (p.includes('right-back') || p.includes('right back') || p === 'rb' || p.includes('rechter verteidiger')) return 'DFD';
  if (p.includes('defen')) return 'DFC';
  if (p.includes('defensive mid') || p === 'cdm' || p === 'dm' || p.includes('defensives mittelfeld')) return 'MCD';
  if (p.includes('central mid') || p === 'cm' || p.includes('zentrales mittelfeld')) return 'MC';
  if (p.includes('attacking mid') || p === 'cam' || p === 'am' || p.includes('offensives mittelfeld')) return 'MCO';
  if (p.includes('left mid') || p.includes('left wing') || p === 'lw' || p === 'lm' || p.includes('linksaussen') || p.includes('left forward')) return 'EI';
  if (p.includes('right mid') || p.includes('right wing') || p === 'rw' || p === 'rm' || p.includes('rechtsaussen') || p.includes('right forward')) return 'ED';
  if (p.includes('midfield')) return 'MC';
  if (p.includes('second striker') || p.includes('hangende spitze')) return 'MCO';
  if (p.includes('centre-forward') || p.includes('center-forward') || p.includes('striker') || p === 'cf' || p === 'st' || p.includes('mittelstürmer')) return 'DC';
  if (p.includes('forward') || p.includes('attack')) return 'DC';
  if (p.includes('winger')) return 'ED';
  return 'MC';
}

function mapNat(nat) {
  const n = (nat || '').toLowerCase();
  const map = {
    'argentina':'ARG','brazil':'BRA','brasil':'BRA','chile':'CHI','paraguay':'PAR',
    'uruguay':'URU','colombia':'COL','peru':'PER','perú':'PER','ecuador':'ECU',
    'venezuela':'VEN','bolivia':'BOL','mexico':'MEX','méxico':'MEX',
    'england':'ING','spain':'ESP','españa':'ESP','france':'FRA',
    'germany':'ALE','italy':'ITA','netherlands':'HOL','russia':'RUS',
    'belgium':'BEL','portugal':'POR','turkey':'TUR',
    'usa':'USA','united states':'USA','japan':'JAP','south korea':'COR',
    'nigeria':'NIG','senegal':'SEN','cameroon':'CAM','ghana':'GHA',
    'ivory coast':'CIV','morocco':'MAR','egypt':'EGI','croatia':'CRO',
    'serbia':'SER','denmark':'DIN','sweden':'SUE','norway':'NOR',
    'austria':'AUT','switzerland':'SUI','poland':'POL','czech republic':'CZE',
    'czechia':'CZE','scotland':'ESC','wales':'GAL','ireland':'IRL',
    'costa rica':'CRC','honduras':'HON','jamaica':'JAM','canada':'CAN',
    'australia':'AUS','new zealand':'NZL','ukraine':'UCR','algeria':'ARG_DZ',
    'tunisia':'TUN','mali':'MAL','guinea':'GUI','gabon':'GAB',
    'democratic republic of congo':'COD','slovenia':'SVN','slovakia':'SVK',
    'hungary':'HUN','romania':'RUM','greece':'GRE','georgia':'GEO',
    'iran':'IRN','north macedonia':'MKD','albania':'ALB','montenegro':'MNE',
    'bosnia and herzegovina':'BIH','bosnia-herzegovina':'BIH','kosovo':'KOS',
    'finland':'FIN','iceland':'ISL','israel':'ISR','jamaica':'JAM',
    'cuba':'CUB','dominican republic':'DOM','panama':'PAN','el salvador':'SLV'
  };
  for (const [key, val] of Object.entries(map)) {
    if (n === key || n.includes(key)) return val;
  }
  return nat ? nat.slice(0, 3).toUpperCase() : 'UNK';
}

function mapLeague(country, league) {
  const c = (country||'').toLowerCase();
  if (c.includes('argentin')) return 'Liga ARG';
  if (c.includes('brazil') || c.includes('brasil')) return 'Brasil';
  if (c.includes('chile')) return 'Chile';
  if (c.includes('paragua')) return 'Paraguay';
  if (c.includes('urugua')) return 'Uruguay';
  if (c.includes('colombia')) return 'Colombia';
  if (c.includes('peru') || c.includes('perú')) return 'Perú';
  if (c.includes('ecuador')) return 'Ecuador';
  if (c.includes('venezuel')) return 'Venezuela';
  if (c.includes('bolivi')) return 'Bolivia';
  if (c.includes('mexic') || c.includes('méxic')) return 'Liga MX';
  if (c.includes('united states') || c.includes('usa')) return 'MLS';
  if (c.includes('england')) return 'Premier';
  if (c.includes('spain')) return 'España';
  if (c.includes('france')) return 'Francia';
  if (c.includes('germany')) return 'Alemania';
  if (c.includes('italy')) return 'Italia';
  if (c.includes('netherlands')) return 'Holanda';
  if (c.includes('russia')) return 'Rusia';
  if (c.includes('belgium')) return 'Bélgica';
  if (c.includes('portugal')) return 'Portugal';
  if (c.includes('turkey')) return 'Turquía';
  return league || country || 'Otro';
}

function generateOutput() {
  if (allPlayers.length === 0) {
    document.getElementById('output').value = '// No se encontraron jugadores';
    return;
  }

  const seen = new Set();
  const unique = [];
  for (const p of allPlayers) {
    const key = p.name.toLowerCase();
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(p);
    }
  }

  let csv = 'Nombre,Posicion,Edad,Nacionalidad,Club,Liga,Goles,Asistencias,Partidos,ValorMercado\n';
  let js = '  // === JUGADORES EXTRAIDOS DE SPORTDB ===\n';

  for (const p of unique) {
    const pos = mapPos(p.pos);
    const nat = mapNat(p.nat);
    const lg = mapLeague(p.country, p.league);
    const val = p.marketVal || 1;
    const num = p.number || (pos === 'ARQ' ? 1 : pos.includes('DF') ? 4 : pos.includes('MC') || pos === 'MCD' ? 8 : 9);

    js += `  a(${num},'${p.name.replace(/'/g,"\\'")}','${pos}',${p.age||25},'${nat}','${p.club.replace(/'/g,"\\'")}','${lg}',${val},0,0);\n`;
    csv += `"${p.name}","${pos}",${p.age||''},"${nat}","${p.club}","${lg}",${p.goals||0},${p.assists||0},${p.apps||0},${val}\n`;
  }

  js += `  // Total: ${unique.length} jugadores extraidos\n`;

  document.getElementById('output').value = js;
  window._csvData = csv;
  window._jsData = js;

  log(`Output generado: ${unique.length} jugadores únicos (de ${allPlayers.length} totales)`);
}

function copyOutput() {
  const el = document.getElementById('output');
  el.select();
  document.execCommand('copy');
  alert('Copiado al portapapeles');
}

function downloadOutput() {
  const blob = new Blob([window._jsData || document.getElementById('output').value], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'players_sportdb.js';
  a.click();
}

function downloadCSV() {
  if (!window._csvData) { alert('Primero extraé los jugadores'); return; }
  const blob = new Blob([window._csvData], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'players_sportdb.csv';
  a.click();
}
</script>
